<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINESWEEPER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div id="main-container">
            <div id="game-name">
                <h1>MineSweeper</h1>
            </div>
            <button id="game-settings-button">
                <h2>Настроить игру</h2>
            </button>
        </div>
        
        <div id="game-settings-form">
            <button class="difficulty-selector-button" data-row="9" data-mines="15">
                <p>Лёгкий уровень сложности</p>
                <p>9x9 клеток, 15 мин</p>
            </button>
            <button class="difficulty-selector-button" data-row="16" data-mines="50">
                <p>Средний уровень сложности</p>
                <p>16x16 клеток, 50 мин</p>
            </button>
            <button class="difficulty-selector-button" data-row="25" data-mines="150">
                <p>Жёсткий уровень сложности</p>
                <p>25x25 клеток, 150 мин</p>
            </button>
            <button id="game-settings-custom-button">Пользовательские <br> настройки</button>
        </div>
        <form id="game-settings-form-custom">
            <img src="images/pngwing.com (5).png" id="back-to-basic-settings">
            <p>Размер клеток 33x33px, не рекомендуется выставлять количество строк выше 25 при FullHD мониторе</p>
            <div class="custom-settings-inputs">
                <p>Количество строк</p>
                <input type="number" name="rows">
            </div>
            <div class="custom-settings-inputs">
                <p>Количество столбцов</p>
                <input type="number" name="columns">
            </div>
            <div class="custom-settings-inputs">
                <p>Количество мин</p>
                <input type="number" name="mines">
            </div>
            <button id="go-custom-game" type="submit">Начать игру</button>
        </form>
        <div id="minefield-container">
            <div>
                <div id="restart-in-game"></div>
                <div id="time-in-game"></div>
                <div id="count-mines-container">
                    <p id="count-mines"></p>
                    <img src="images/mine.png">
                </div>
            </div>
            <div id="minefield"></div>
        </div>
        <div id="container-end-game">
            <div id="end-game">
                <p id="end-game-text"></p>
                <button id="restart-game">Начать заново</button>
                <button id="main-menu">Главное меню</button>
            </div>
        </div>
    </main>
</body>
<script src="main.mjs" type="module"></script>
</html>
